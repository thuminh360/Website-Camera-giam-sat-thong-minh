<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#6b7c93;
}

.login-box{
width:400px;
background:#d1d5db;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h2{
margin-bottom:10px;
color:#1f2937;
}

p{
margin-bottom:20px;
color:#475569;
}

label{
display:block;
margin-bottom:6px;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #cbd5e1;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#059669;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#047857;
}

.error{
display:none;
color:red;
margin-top:10px;
}
</style>
</head>
<body>

<div class="login-box">
<h2>Smart Camera System</h2>
<p>Surveillance Management Platform</p>

<label>Email</label>
<input id="email" type="email">

<label>Mật khẩu</label>
<input id="password" type="password">

<button onclick="login()">
Login
</button>

<div id="error" class="error">
Sai email hoặc mật khẩu
</div>

</div>

<script>
function login(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

// ADMIN
if(
email==="admin@camera.local" &&
password==="admin123"
){
window.location.href="tongquan.html";
}

// STAFF
else if(
email==="staff@camera.local" &&
password==="staff123"
){
window.location.href="staff.html"; // file màn hình nhân viên
}

// SAI
else{
document.getElementById("error").style.display="block";
}

}

// ENTER LOGIN
document.addEventListener("keypress",function(e){
if(e.key==="Enter"){
login();
}
});
</script>

</body>
</html>
